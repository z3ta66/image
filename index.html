<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeta Webhook Test</title>
    <style>
        :root {
            --primary: #e63946;
            --bg: #0a0a0f;
            --card: #12121c;
        }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.2);
            width: 350px;
        }
        h2 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a2e;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        #status { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ZETA PANEL</h2>
    <input type="text" id="username" placeholder="Kullanıcı Adı">
    <input type="text" id="message" placeholder="Mesajın">
    <button onclick="sendDiscord()">Bildirim Gönder</button>
    <div id="status"></div>
</div>

<script>
    async function sendDiscord() {
        const webhookURL = 'https://discord.com/api/webhooks/1502993354504536164/cnoJZxHy9jvRrcNAVQsYj4QZy70IvnsFWdKAPIH5nUswb9Fui_lwJKkLiWu5zX9fojTW';
        const user = document.getElementById('username').value;
        const msg = document.getElementById('message').value;
        const statusDiv = document.getElementById('status');

        if(!user || !msg) {
            statusDiv.innerText = "⚠️ Boş alan bırakma!";
            return;
        }

        statusDiv.innerText = "⏳ Gönderiliyor...";

        try {
            const response = await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        title: "🚀 Yeni Bildirim",
                        color: 15105570, // Kırmızı tonu
                        fields: [
                            { name: "Gönderen", value: user, inline: true },
                            { name: "Mesaj", value: msg }
                        ],
                        timestamp: new Date()
                    }]
                })
            });

            if (response.ok) {
                statusDiv.style.color = "#2dff6e";
                statusDiv.innerText = "✅ Discord'a iletildi!";
            } else {
                statusDiv.style.color = "#ff4d4d";
                statusDiv.innerText = "❌ Hata: " + response.status;
            }
        } catch (error) {
            statusDiv.style.color = "#ff4d4d";
            statusDiv.innerText = "❌ Bağlantı hatası!";
            console.error(error);
        }
    }
</script>

</body>
</html>
